
<head>
    <meta charset="UTF-8">
    <title>3D Storage</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    {% load static %}
    <link rel="stylesheet" href="{% static 'gallery/style.css' %}">
</head>
<body>
    <header>
        <h1>{{ page_title }}</h1>
        <!-- Ссылка на загрузку теперь выглядит как кнопка -->
        <a href="{% url 'upload' %}" class="btn" style="background-color: #28a745;">+
        Загрузить модель</a>
    </header>
    <main>
    <!-- Контейнер сетки -->
        <div class="gallery-grid">
            {% for asset in assets %}
        <!-- Карточка -->
                <div class="asset-card">
        
                    <div id="model-container-{{ asset.id }}" data-url="{% if asset.file %}{{ asset.file.url }}{% endif %}" style="width: 300px !important; height: 300px !important; border: 2px solid red;">
    <!-- Здесь будет модель -->
                    </div>
        <!-- 2. Информация (Нижняя часть) -->
                    <div class="card-info">
                        <h3 class="card-title">{{ asset.title }}</h3>
                        <div class="card-meta">
                            <span>📅 {{ asset.created_at|date:"d M Y" }}</span>
                            {% if asset.file %}
                                <span style="float: right;">💾 Файл готов</span>
                            {% endif %}
                        </div>
                        {% if asset.file %}
                            <a href="{{ asset.file.url }}" class="btn" download>Скачать .glb</a>
                        {% endif %}
                    </div>
                 </div>
            {% empty %}
                <p>База пуста.</p>
            {% endfor %}
        </div>
    </main>
<script type="module">
    import { loadModel } from "{% static 'gallery/js/viewer.js' %}";
    
    const containers = document.querySelectorAll('[id^="model-container-"]');
    containers.forEach(container => {
        const modelUrl = container.dataset.url;
        if (modelUrl) {
            loadModel(container.id, modelUrl);
        } else {
            // Заглушка для пустых карточек
            container.innerHTML = '<div style="color:#666;font-size:14px;padding:20px;">Нет модели</div>';
        }
    });
</script>
</body>
